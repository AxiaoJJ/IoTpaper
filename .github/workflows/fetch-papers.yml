name: Fetch new IoT/firmware papers

on:
  schedule:
    # weekly, Monday ~09:00 UTC (off the :00 mark to spread API load)
    - cron: "17 9 * * 1"
  workflow_dispatch: {}   # manual run from the Actions tab

permissions:
  contents: read
  issues: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run fetcher
        run: python3 scripts/fetch_papers.py

      - name: Open issue if there are new candidates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          n=$(cat scripts/candidates.count 2>/dev/null || echo 0)
          if [ "${n:-0}" -gt 0 ]; then
            gh label create "new-papers" --description "Auto-discovered IoT/firmware paper candidates" --color 0E8A16 2>/dev/null || true
            title="New IoT/firmware paper candidates ($(date -u +%Y-%m-%d)) — ${n} found"
            gh issue create --title "$title" --body-file scripts/candidates.md --label "new-papers"
          else
            echo "No new candidates this run."
          fi
